<!doctype html>
<html lang="en-us">
<head>
  <link rel="apple-touch-icon" sizes="512x512" href="https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/mcpe_ios_icon.png">
  <meta charset="utf-8">
  <meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" name="viewport">
  <title>Minecraft</title>
  <link href="https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/manifest.json" rel="manifest">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    canvas.emscripten {
      display: block;
      outline: none;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    var Module = {
      canvas: document.getElementById("canvas"),
      // Redirect all relative asset lookups (index.wasm, index.data) to the CDN
      locateFile: function(path) {
        return "https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/" + path;
      }
    };

    (function () {
      var canvas = document.getElementById("canvas");

      // Lock pointer on real mouse clicks only
      canvas.addEventListener("mousedown", function (e) {
        if (e.isTrusted && !document.pointerLockElement && !window.mcMenuOpen) {
          canvas.requestPointerLock();
        }
      });

      // Prevent default touch behaviours on canvas (scroll, double-tap zoom)
      canvas.addEventListener("touchstart", function (e) {
        e.preventDefault();
      }, { passive: false });

      // Block document-level touch defaults for non-input elements
      document.addEventListener("touchstart", function (e) {
        var t = e.target.tagName;
        if (t !== "INPUT" && t !== "TEXTAREA" && t !== "BUTTON" && t !== "SELECT" && t !== "OPTION") {
          e.preventDefault();
        }
      }, { passive: false });
    })();
  </script>

  <script>
    // Service worker registration
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/sw.js")
          .then(function (reg) {
            console.log("ServiceWorker registration successful with scope: ", reg.scope);
          }, function (err) {
            console.log("ServiceWorker registration failed: ", err);
          });
      });
    }
  </script>

  <!-- Platform shim must load before index.js -->
  <script src="https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/mc_platform.js"></script>

  <!-- Main Emscripten bundle (loads index.wasm + index.data via locateFile above) -->
  <script async src="https://cdn.jsdelivr.net/gh/MonkeTGG/mcpeweb/index.js"></script>

</body>
</html>
